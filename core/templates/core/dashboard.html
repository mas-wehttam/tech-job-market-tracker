<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scraped Job Board Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">🚀 Job Scout Pipeline</h1>
            <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">Live API Connected</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Search Keywords</label>
                    <input type="text" id="search-input" placeholder="e.g., Python, Django, React" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Currency</label>
                    <select id="currency-filter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="">All Currencies</option>
                        <option value="USD">USD ($)</option>
                        <option value="PHP">PHP (₱)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sort By</label>
                    <select id="sort-filter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="-scraped_at">Newest First</option>
                        <option value="min_salary">Lowest Salary</option>
                        <option value="-max_salary">Highest Salary</option>
                    </select>
                </div>
            </div>
        </section>

        <div id="job-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div class="mt-12 flex justify-center">
            <button id="load-more-btn" class="hidden px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Load More Jobs
            </button>
        </div>

    </main>

    <script>
        const container = document.getElementById('job-container');
        const searchInput = document.getElementById('search-input');
        const currencyFilter = document.getElementById('currency-filter');
        const sortFilter = document.getElementById('sort-filter');
        const loadMoreBtn = document.getElementById('load-more-btn');

        let nextPageUrl = null;

        async function loadJobs(targetUrl = null, appendMode = false) {
            try {
                if (!targetUrl) {
                    const searchQuery = searchInput.value;
                    const currencyQuery = currencyFilter.value;
                    const sortQuery = sortFilter.value;
                    targetUrl = `/api/v1/jobposts/?q=${searchQuery}&currency=${currencyQuery}&order-by=${sortQuery}`;
                }


                if (!appendMode) {
                    container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500 font-medium animate-pulse">Filtering live jobs database...</div>';
                    loadMoreBtn.classList.add('hidden');
                }

                const response = await fetch(targetUrl);
                const data = await response.json();
                const jobs = data.results;

                nextPageUrl = data.next;

                if (!appendMode) {
                    container.innerHTML = '';
                }

                if (jobs.length === 0 && !appendMode) {
                    container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">No jobs found matching your criteria.</div>`;
                    return;
                }

                jobs.forEach(job => {
                    const salaryDisplay = job.min_salary 
                        ? `${job.currency} ${job.min_salary.toLocaleString()} - ${job.max_salary.toLocaleString()} / ${job.salary_period}`
                        : "Salary Negotiable";

                    const cardHTML = `
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow flex flex-col justify-between">
                            <div>
                                <span class="text-xs font-semibold uppercase tracking-wider px-2 py-1 bg-gray-100 text-gray-600 rounded">
                                    ${job.salary_period}
                                </span>
                                <h3 class="text-lg font-bold text-gray-900 mt-2 mb-1">${job.title}</h3>
                                <p class="text-sm text-green-600 font-semibold mb-4">${salaryDisplay}</p>
                                
                                <div class="mb-4">
                                    <span class="text-xs font-medium text-gray-500 block mb-1">Required Skills:</span>
                                    <p class="text-sm text-gray-700 line-clamp-3">${job.required_skills || 'Not specified'}</p>
                                </div>
                            </div>
                            
                            <div class="pt-4 border-t border-gray-100 flex justify-between items-center mt-auto">
                                <span class="text-xs text-gray-400">Scraped: ${new Date(job.scraped_at).toLocaleDateString()}</span>
                                <a href="${job.link}" target="_blank" class="inline-flex items-center text-sm font-semibold text-blue-600 hover:text-blue-800">
                                    Apply Externally →
                                </a>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHTML);
                });

                if (nextPageUrl) {
                    loadMoreBtn.classList.remove('hidden');
                } else {
                    loadMoreBtn.classList.add('hidden');
                }

            } catch (error) {
                console.error("API Connection Error:", error);
                container.innerHTML = `<div class="col-span-full text-center py-12 text-red-500">Failed to communicate with back-end data stream.</div>`;
            }
        }

        function handleFilterReset() {
            loadJobs(null, false);
        }

        currencyFilter.addEventListener('change', handleFilterReset);
        sortFilter.addEventListener('change', handleFilterReset);
        searchInput.addEventListener('input', handleFilterReset);
        
        loadMoreBtn.addEventListener('click', () => {
            if (nextPageUrl) {
                loadJobs(nextPageUrl, true); // True tells the engine to APPEND rather than clear
            }
        });

        loadJobs();
    </script>
</body>
</html>
